<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Authentication | Local Police Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1E1B4B',
            secondary: '#B91C1C',
            accent: '#D97706',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body {
      background: #0f0e1a;
      background-image: 
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(185,28,28,0.1) 0%, transparent 50%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background elements */
    .bg-glow {
      position: absolute; width: 400px; height: 400px;
      border-radius: 50%; background: rgba(99,102,241,0.1);
      filter: blur(100px); z-index: -1; animation: float 10s infinite alternate;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 40px) scale(1.1); }
    }

    .login-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 10;
    }

    .login-box::before {
      content: ''; position: absolute; inset: 0;
      border-radius: 32px; padding: 1px;
      background: linear-gradient(135deg, rgba(99,102,241,0.3), transparent, rgba(185,28,28,0.3));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    .input-field {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 16px 20px;
      color: white;
      font-size: 14px;
      font-weight: 500;
      width: 100%;
      outline: none;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: #6366f1;
      background: rgba(99, 102, 241, 0.08);
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }

    .input-label {
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #64748b;
      margin-bottom: 8px;
      display: block;
      padding-left: 4px;
    }

    .btn-auth {
      background: linear-gradient(135deg, #4338ca, #6366f1);
      color: white; border: none; padding: 18px;
      border-radius: 14px; font-size: 13px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.2em;
      cursor: pointer; transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(67, 56, 202, 0.4);
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .btn-auth:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(67, 56, 202, 0.5);
    }

    .btn-auth:active { transform: translateY(0); }

    .status-msg {
      font-size: 10px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 0.1em; text-align: center; margin-top: 24px;
      min-height: 15px; color: #94a3b8;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loader {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    .back-link {
      font-size: 11px; font-weight: 700; color: #475569;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
      transition: all 0.2s; justify-content: center;
      margin-top: 32px; text-transform: uppercase; letter-spacing: 0.1em;
    }
    .back-link:hover { color: #818cf8; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body>

  <div class="bg-glow" style="top: -100px; left: -100px; background: rgba(99,102,241,0.15)"></div>
  <div class="bg-glow" style="bottom: -100px; right: -100px; background: rgba(185,28,28,0.1)"></div>

  <main class="fade-in login-box">
    <div class="text-center mb-10">
      <div class="mb-6 inline-block relative">
        <div class="absolute inset-0 bg-blue-500/20 blur-xl rounded-full"></div>
        <img src="assets/tn_police_logo.png" alt="TN Police Logo" class="h-20 w-20 object-contain bg-white rounded-full p-1.5 border-2 border-indigo-500/30 relative z-10 shadow-2xl">
      </div>
      <div>
        <h1 class="text-white text-2xl font-black uppercase tracking-tighter italic leading-none">Restricted Entry</h1>
        <div class="mt-2 text-[9px] font-black uppercase tracking-[0.4em] text-indigo-400">Secure Node Authentication</div>
      </div>
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label class="input-label" for="email">Administrator ID</label>
        <input type="email" id="email" required class="input-field" placeholder="admin@police.gov" spellcheck="false">
      </div>
      <div>
        <label class="input-label" for="password">Security Passkey</label>
        <input type="password" id="password" required class="input-field" placeholder="••••••••••••">
      </div>
      
      <button type="submit" class="btn-auth">
        <span>Verify Identity</span>
        <div id="loader" class="loader hidden"></div>
      </button>
    </form>

    <div id="err" class="status-msg"></div>

    <a href="index.html" class="back-link group">
      <span class="group-hover:-translate-x-1 transition-transform">←</span>
      Return to Public Portal
    </a>
  </main>

  <script src="js/script.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const pw = document.getElementById('password').value;
      const errBox = document.getElementById('err');
      const loader = document.getElementById('loader');
      
      errBox.innerText = 'Initializing Handshake...';
      errBox.style.color = '#94a3b8';
      loader.classList.remove('hidden');

      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password: pw })
        });
        
        if (data.role !== 'admin') {
          errBox.innerText = "Access Forbidden: Insufficient clearance level.";
          errBox.style.color = '#f87171';
          loader.classList.add('hidden');
          return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        
        errBox.innerText = "Authentication Successful. Mapping Neural Link...";
        errBox.style.color = '#4ade80';
        
        // Brief delay for dramatic effect
        setTimeout(() => {
          window.location.href = 'admin.html';
        }, 800);

      } catch (err) {
        errBox.innerText = "Verification Failed: " + err.message;
        errBox.style.color = '#f87171';
        loader.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
